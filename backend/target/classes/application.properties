spring.application.name=backend
server.port=8081

# Railway MySQL Database Configuration
spring.datasource.url=jdbc:mysql://centerbeam.proxy.rlwy.net:29833/railway?rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=bvQPKsRdTSIVcJcfUEgyJxClAAxXWcYH
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# JWT Secret
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:4200,http://localhost:4201

# Performance: GZIP Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=2048

# Performance: HikariCP Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Performance: Caching
spring.cache.type=caffeine
spring.cache.cache-names=users,departments,unread_counts,notif_history
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Timezone Synchronization
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata