<nav class="navbar animate-fade" *ngIf="isLoggedIn()">
  <div class="nav-brand" routerLink="/dashboard">
    <div class="logo-symbol">
      <svg viewBox="0 0 24 24" class="icon logo-svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
    </div>
    <span class="logo-text">NOTIFY<span class="red-dot">.</span></span>
  </div>
  
  <div class="nav-links">
    <div class="main-nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span>Insights</span>
      </a>
      <a *ngIf="isAdmin()" routerLink="/admin" routerLinkActive="active">
        <span>Administration</span>
      </a>
    </div>
    
    <div class="user-control glass-card">
      <div class="notifications-trigger" routerLink="/dashboard">
        <svg viewBox="0 0 24 24" class="icon">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="pulse-badge" *ngIf="unreadCount() > 0">{{unreadCount()}}</span>
      </div>
      
      <div class="divider"></div>
      
      <div class="user-meta">
        <span class="user-tag">{{username()}}</span>
      </div>

      <button class="action-btn logout" (click)="logout()" title="Secure Exit">
        <svg viewBox="0 0 24 24" class="icon">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</nav>

<main [class.has-nav]="isLoggedIn()">
  <router-outlet></router-outlet>
</main>

<app-toast></app-toast>
